<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案詳細進度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
        }

        .back-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .project-overview {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .project-title {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .project-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
            color: #666;
            font-size: 0.95em;
        }

        .project-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-description {
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
            padding: 20px;
            background: #f9fafb;
            border-left: 4px solid #667eea;
            border-radius: 8px;
        }

        .progress-overview {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .overall-progress {
            margin: 30px 0;
        }

        .progress-bar-container {
            margin: 15px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 1s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .phases-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box   ow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .phase-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
        }

        .phase-item {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .phase-item:hover {
            background: #f3f4f6;
            transform: translateX(5px);
        }

        .phase-item.completed {
            border-left-color: #10b981;
        }

        .phase-item.in_progress {
            border-left-color: #f59e0b;
        }

        .phase-item.not_started {
            border-left-color: #d1d5db;
        }

        .phase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .phase-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .phase-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .phase-status.completed {
            background: #d1fae5;
            color: #065f46;
        }

        .phase-status.in_progress {
            background: #fef3c7;
            color: #92400e;
        }

        .phase-status.not_started {
            background: #f3f4f6;
            color: #4b5563;
        }

        .phase-content {
            margin: 15px 0;
        }

        .phase-checklist {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .checklist-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checklist-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .checklist-checkbox.checked {
            background: #10b981;
            border-color: #10b981;
            position: relative;
        }

        .checklist-checkbox.checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
        }

        .skills-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .timeline-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .timeline-item {
            position: relative;
            padding-left: 30px;
            margin: 20px 0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 12px;
            width: 2px;
            height: calc(100% + 10px);
            background: #e5e7eb;
        }

        .timeline-item:last-child::after {
            display: none;
        }

        .timeline-date {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .timeline-content {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .error-state {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            color: #7f1d1d;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .project-meta {
                flex-direction: column;
                gap: 10px;
            }

            .phase-checklist {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner"></div>
            <p>正在載入專案詳細資料...</p>
        </div>

        <div class="error-state" id="errorState" style="display: none;">
            <h3>❌ 載入失敗</h3>
            <p id="errorMessage">無法載入專案資料</p>
            <button class="back-button" onclick="goBack()">返回總覽</button>
        </div>

        <div id="projectContent" style="display: none;">
            <!-- 內容將由 JavaScript 動態生成 -->
        </div>
    </div>

    <script>
        let projectData = null;

        // 頁面載入時獲取專案名稱
        window.addEventListener('load', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectName = urlParams.get('project');

            if (!projectName) {
                showError('缺少專案名稱參數');
                return;
            }

            await loadProjectData(projectName);
        });

        // 載入專案資料
        async function loadProjectData(projectName) {
            showLoading();

            try {
                console.log(`🔍 載入專案: ${projectName}`);

                // 從 all-projects-index.json 載入專案資料
                const indexResponse = await fetch('./all-projects-index.json');
                if (!indexResponse.ok) {
                    throw new Error('無法載入專案索引檔案');
                }

                const indexData = await indexResponse.json();
                console.log(`✅ 索引載入成功，找到 ${indexData.projects.length} 個專案`);

                // 尋找目標專案
                const project = indexData.projects.find(p => p.name === projectName);
                if (!project) {
                    throw new Error(`找不到專案: ${projectName}`);
                }

                console.log(`✅ 找到專案: ${project.displayName}`);
                projectData = project;

                // 確保必要字段存在
                projectData.metrics = projectData.metrics || {};
                projectData.skills = projectData.skills || [];
                projectData.timeline = projectData.timeline || [];

                hideLoading();
                renderProjectDetail();

            } catch (error) {
                console.error('❌ 載入專案失敗:', error);
                showError(`載入專案失敗: ${error.message}`);
            }
        }

        // 原有的載入邏輯作為備案
        async function loadProjectDataLegacy(projectName) {
            showLoading();

            try {
                console.log(`🔄 使用備案載入專案: ${projectName}`);

                // 嘗試載入進度檔案
                const progressFile = `./${projectName}_PROGRESS.json`;
                const planFile = `./${projectName}_YC_PLAN.md`;

                let progressData = null;
                let planData = null;

                // 載入進度資料
                try {
                    const progressResponse = await fetch(progressFile);
                    if (progressResponse.ok) {
                        progressData = await progressResponse.json();
                        console.log('✅ 進度資料載入成功');
                    }
                } catch (error) {
                    console.log('⚠️ 進度檔案載入失敗:', error.message);
                }

                // 載入計畫資料
                try {
                    const planResponse = await fetch(planFile);
                    if (planResponse.ok) {
                        const planText = await planResponse.text();
                        planData = parsePlanFile(planText);
                        console.log('✅ 計畫資料載入成功');
                    }
                } catch (error) {
                    console.log('⚠️ 計畫檔案載入失敗:', error.message);
                }

                if (!progressData && !planData) {
                    throw new Error('無法載入專案資料');
                }

                // 組合專案資料
                projectData = combineProjectData(projectName, progressData, planData);

                hideLoading();
                renderProjectDetail();

            } catch (error) {
                console.error('❌ 載入失敗:', error);
                showError(error.message);
            }
        }

        // 組合專案資料
        function combineProjectData(projectName, progressData, planData) {
            const combined = {
                name: projectName,
                displayName: getDisplayName(projectName),
                currentPhase: null,
                progress: 0,
                phases: [],
                lastUpdated: null,
                description: null,
                skills: [],
                timeline: [],
                plan: planData
            };

            // 處理進度資料
            if (progressData) {
                if (progressData.project_info) {
                    combined.currentPhase = progressData.project_info.current_phase;
                    combined.lastUpdated = progressData.project_info.last_updated;
                }
                if (progressData.phases) {
                    combined.phases = normalizePhases(progressData.phases);
                    combined.progress = calculateProgress(combined.phases);
                }
                if (progressData.skills_usage) {
                    combined.skills = extractSkills(progressData.skills_usage);
                }
                if (progressData.recent_changes) {
                    combined.timeline = progressData.recent_changes;
                }
                if (progressData.overall_metrics) {
                    combined.metrics = progressData.overall_metrics;
                }
            }

            // 處理計畫資料
            if (planData && !combined.description) {
                combined.description = planData.description;
            }

            return combined;
        }

        // 解析計畫檔案
        function parsePlanFile(content) {
            const lines = content.split('\n');
            const planData = {
                title: '',
                description: '',
                phases: []
            };

            // 提取標題
            for (const line of lines) {
                if (line.startsWith('# ')) {
                    planData.title = line.substring(2).trim();
                    break;
                }
            }

            // 提取描述
            const descMatch = content.match(/## 專案概述[\s\S]*?(?=\n##|\n*$)/);
            if (descMatch) {
                planData.description = descMatch[0]
                    .substring(2)
                    .trim()
                    .substring(0, 500) + '...';
            }

            // 提取階段
            const phaseMatches = content.matchAll(/## Phase \d+:?\s*([^\n]+)/g);
            phaseMatches.forEach(match => {
                planData.phases.push({
                    name: match[1].trim(),
                    title: match[1].trim()
                });
            });

            return planData;
        }

        // 標準化階段資料
        function normalizePhases(phases) {
            return Object.entries(phases).map(([id, phase]) => ({
                id: id,
                name: phase.name,
                title: phase.name,
                status: phase.status || 'unknown',
                progress: phase.progress_percentage || 0,
                start_date: phase.start_date || null,
                end_date: phase.end_date || null,
                checklist: phase.checklist_completion || '0/0',
                content: phase.content || ''
            }));
        }

        // 計算進度
        function calculateProgress(phases) {
            if (!phases || phases.length === 0) return 0;
            const totalProgress = phases.reduce((sum, phase) => sum + (phase.progress || 0), 0);
            return Math.round(totalProgress / phases.length);
        }

        // 提取技能
        function extractSkills(skillsUsage) {
            const allSkills = [];
            if (!skillsUsage) return allSkills;

            Object.values(skillsUsage).forEach(phaseSkills => {
                if (phaseSkills.used_skills) {
                    allSkills.push(...phaseSkills.used_skills);
                }
            });

            return [...new Set(allSkills)];
        }

        // 獲得顯示名稱
        function getDisplayName(name) {
            const displayNames = {
                'admission-master': '升學大師',
                'social': '社群經營大師',
                'social-master': '社群經營大師',
                'project-planning-master': '專案規劃大師'
            };
            return displayNames[name] || name;
        }

        // 渲染專案詳細頁面
        function renderProjectDetail() {
            const container = document.getElementById('projectContent');
            container.innerHTML = '';
            container.style.display = 'block';

            // 頁面標題
            const headerHTML = `
                <div class="header">
                    <div>
                        <h1>${projectData.displayName}</h1>
                        <div class="project-meta">
                            <div class="project-meta-item">📁 ${projectData.name}</div>
                            ${projectData.currentPhase ? `<div class="project-meta-item">🎯 ${projectData.currentPhase}</div>` : ''}
                            ${projectData.lastUpdated ? `<div class="project-meta-item">🕒 ${new Date(projectData.lastUpdated).toLocaleDateString('zh-TW')}</div>` : ''}
                        </div>
                    </div>
                    <button class="back-button" onclick="goBack()">← 返回總覽</button>
                </div>
            `;

            // 專案概述
            const overviewHTML = `
                <div class="project-overview">
                    <h2 class="project-title">${projectData.displayName}</h2>
                    ${projectData.description ? `<div class="project-description">${projectData.description}</div>` : ''}

                    ${projectData.metrics ? `
                        <div class="project-meta" style="margin-top: 25px;">
                            ${projectData.metrics.production_url ? `<div class="project-meta-item">🌐 ${projectData.metrics.production_url}</div>` : ''}
                            ${projectData.metrics.mvp_launch_status ? `<div class="project-meta-item">🚀 ${projectData.metrics.mvp_launch_status}</div>` : ''}
                            ${projectData.metrics.deployment_url ? `<div class="project-meta-item">📦 ${projectData.metrics.deployment_url}</div>` : ''}
                        </div>
                    ` : ''}
                </div>
            `;

            // 進度概覽
            const progressHTML = `
                <div class="progress-overview">
                    <div class="progress-header">
                        <h2 class="progress-title">📊 進度概況</h2>
                        <div class="overall-progress">
                            <span style="font-size: 2em; font-weight: bold; color: #667eea;">${projectData.progress}%</span>
                        </div>
                    </div>

                    <div class="progress-bar-container">
                        <div class="progress-label">
                            <span>整體完成度</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${projectData.progress}%">
                                ${projectData.progress}%
                            </div>
                        </div>
                    </div>

                    ${renderSkills()}
                </div>
            `;

            // 階段詳細
            const phasesHTML = `
                <div class="phases-section">
                    <h2 class="phase-title">📋 YC 5-Phase 階段詳情</h2>
                    ${renderPhases()}
                </div>
            `;

            // 時間軸
            if (projectData.timeline && projectData.timeline.length > 0) {
                container.innerHTML += `
                    <div class="timeline-section">
                        <h2 class="phase-title">📅 重要里程碑</h2>
                        ${renderTimeline()}
                    </div>
                `;
            }

            container.innerHTML += headerHTML + overviewHTML + progressHTML + phasesHTML;

            // 添加動畫效果
            const sections = container.querySelectorAll('.project-overview, .progress-overview, .phases-section, .timeline-section');
            sections.forEach((section, index) => {
                section.style.animationDelay = `${index * 0.1}s`;
                section.style.animation = 'fadeInUp 0.6s ease forwards';
            });
        }

        // 渲染技能
        function renderSkills() {
            if (!projectData.skills || projectData.skills.length === 0) {
                return '';
            }

            return `
                <div style="margin-top: 25px;">
                    <h3 style="margin-bottom: 15px; color: #444;">🛠️ 使用的 Skills</h3>
                    <div class="skills-list">
                        ${projectData.skills.map(skill => `
                            <div class="skill-badge">${skill}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // 渲染階段
        function renderPhases() {
            if (!projectData.phases || projectData.phases.length === 0) {
                return '<p style="color: #999; text-align: center; padding: 20px;">無階段資料</p>';
            }

            return projectData.phases.map(phase => `
                <div class="phase-item ${phase.status}">
                    <div class="phase-header">
                        <div class="phase-name">${phase.name}</div>
                        <div class="phase-status ${phase.status}">${getStatusText(phase.status)}</div>
                    </div>

                    ${phase.status !== 'not_started' ? `
                        <div class="progress-bar-container">
                            <div class="progress-label">
                                <span>完成度</span>
                                <span>${phase.progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${phase.progress}%">
                                    ${phase.progress}%
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    ${renderChecklist(phase)}
                </div>
            `).join('');
        }

        // 渲染檢核表
        function renderChecklist(phase) {
            if (!phase.checklist || phase.checklist === '0/0') {
                return '';
            }

            const [completed, total] = phase.checklist.split('/').map(Number);

            return `
                <div class="phase-checklist">
                    ${Array.from({length: total}, (_, i) => `
                        <div class="checklist-item">
                            <div class="checklist-checkbox ${i < completed ? 'checked' : ''}"></div>
                            <span>檢核項目 ${i + 1}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 渲染時間軸
        function renderTimeline() {
            return projectData.timeline.map(item => `
                <div class="timeline-item">
                    <div class="timeline-date">${new Date(item.date).toLocaleDateString('zh-TW')}</div>
                    <div class="timeline-content">
                        <strong>${item.change || item.phase}</strong>
                        ${item.notes ? `<p style="margin-top: 5px; color: #666;">${item.notes}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 狀態文字
        function getStatusText(status) {
            const statusText = {
                'completed': '已完成',
                'in_progress': '進行中',
                'not_started': '未開始',
                'unknown': '未知'
            };
            return statusText[status] || statusText.unknown;
        }

        // 顯示載入狀態
        function showLoading() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('projectContent').style.display = 'none';
        }

        // 隱藏載入狀態
        function hideLoading() {
            document.getElementById('loadingState').style.display = 'none';
        }

        // 顯示錯誤
        function showError(message) {
            hideLoading();
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // 返回總覽
        function goBack() {
            window.close(); // 嘗試關閉當前視窗
            // 如果失敗，則返回總覽頁面
            setTimeout(() => {
                window.location.href = 'all-projects-progress.html';
            }, 100);
        }
    </script>
</body>
</html>
